name: SillyDroid Site Release State

on:
  workflow_dispatch:
    inputs:
      release_event_action:
        description: Manual trigger reason used in the generated site release state.
        required: false
        default: manual-rebuild
        type: choice
        options:
          - published
          - edited
          - deleted
          - manual-rebuild
  release:
    types:
      - published
      - edited
      - deleted

permissions:
  contents: read

concurrency:
  group: sillydroid-site-release-state
  cancel-in-progress: true

jobs:
  publish-release-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Build latest release state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_EVENT_ACTION: ${{ github.event_name == 'release' && github.event.action || github.event.inputs.release_event_action || 'manual-rebuild' }}
        run: |
          set -euo pipefail

          bash ./scripts/publish-sillydroid-site-release-state.sh \
            --repository '${{ github.repository }}' \
            --event-action "$RELEASE_EVENT_ACTION" \
            --output "$RUNNER_TEMP/latest-release.json"

      - name: Upload latest release state to site server
        env:
          SILLYDROID_SITE_SSH_HOST: ${{ secrets.SILLYDROID_SITE_SSH_HOST }}
          SILLYDROID_SITE_SSH_PORT: ${{ secrets.SILLYDROID_SITE_SSH_PORT }}
          SILLYDROID_SITE_SSH_USER: ${{ secrets.SILLYDROID_SITE_SSH_USER }}
          SILLYDROID_SITE_SSH_KEY: ${{ secrets.SILLYDROID_SITE_SSH_KEY }}
          SILLYDROID_SITE_RELEASE_STATE_PATH: ${{ secrets.SILLYDROID_SITE_RELEASE_STATE_PATH }}
        run: |
          set -euo pipefail

          for variable_name in SILLYDROID_SITE_SSH_HOST SILLYDROID_SITE_SSH_USER SILLYDROID_SITE_SSH_KEY SILLYDROID_SITE_RELEASE_STATE_PATH; do
            if [ -z "${!variable_name:-}" ]; then
              echo "Missing required GitHub Actions secret: $variable_name" >&2
              exit 1
            fi
          done

          ssh_port="${SILLYDROID_SITE_SSH_PORT:-22}"
          ssh_root="$RUNNER_TEMP/sillydroid-site-ssh"
          mkdir -p "$ssh_root"
          chmod 700 "$ssh_root"
          printf '%s\n' "$SILLYDROID_SITE_SSH_KEY" > "$ssh_root/id_key"
          chmod 600 "$ssh_root/id_key"

          remote_dir="$(dirname "$SILLYDROID_SITE_RELEASE_STATE_PATH")"
          ssh_common_options=(
            -i "$ssh_root/id_key"
            -p "$ssh_port"
            -o StrictHostKeyChecking=accept-new
            -o IdentitiesOnly=yes
          )
          scp_common_options=(
            -i "$ssh_root/id_key"
            -P "$ssh_port"
            -o StrictHostKeyChecking=accept-new
            -o IdentitiesOnly=yes
          )

          ssh "${ssh_common_options[@]}" "$SILLYDROID_SITE_SSH_USER@$SILLYDROID_SITE_SSH_HOST" "mkdir -p '$remote_dir'"
          scp "${scp_common_options[@]}" "$RUNNER_TEMP/latest-release.json" "$SILLYDROID_SITE_SSH_USER@$SILLYDROID_SITE_SSH_HOST:$SILLYDROID_SITE_RELEASE_STATE_PATH"
