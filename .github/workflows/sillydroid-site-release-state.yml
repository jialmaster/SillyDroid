name: SillyDroid Site Release State

on:
  workflow_dispatch:
    inputs:
      release_event_action:
        description: Manual trigger reason used in the generated site release state.
        required: false
        default: manual-rebuild
        type: choice
        options:
          - published
          - edited
          - deleted
          - manual-rebuild
  release:
    types:
      - published
      - edited
      - deleted

permissions:
  contents: read

concurrency:
  group: sillydroid-site-release-state
  cancel-in-progress: true

jobs:
  publish-release-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Build latest release state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_EVENT_ACTION: ${{ github.event_name == 'release' && github.event.action || github.event.inputs.release_event_action || 'manual-rebuild' }}
        run: |
          set -euo pipefail

          bash ./scripts/publish-sillydroid-site-release-state.sh \
            --repository '${{ github.repository }}' \
            --event-action "$RELEASE_EVENT_ACTION" \
            --output "$RUNNER_TEMP/latest-release.json"

      - name: Publish latest release state to site API
        env:
          SILLYDROID_SITE_RELEASE_API_URL: ${{ vars.SILLYDROID_SITE_RELEASE_API_URL || 'https://sd.jlmaster.online/api/admin/projects/sillydroid/releases/latest' }}
          SILLYDROID_SITE_RELEASE_WRITER_KEY: ${{ secrets.SILLYDROID_SITE_RELEASE_WRITER_KEY }}
        run: |
          set -euo pipefail

          for variable_name in SILLYDROID_SITE_RELEASE_API_URL SILLYDROID_SITE_RELEASE_WRITER_KEY; do
            if [ -z "${!variable_name:-}" ]; then
              echo "Missing required GitHub Actions secret: $variable_name" >&2
              exit 1
            fi
          done

          # 站点后端负责校验、存储并发布 latest release state；Android 发布链只负责按契约推送 JSON。
          curl --fail-with-body --silent --show-error \
            -X PUT "$SILLYDROID_SITE_RELEASE_API_URL" \
            -H 'Content-Type: application/json' \
            -H "X-SillyDroid-Release-Key: $SILLYDROID_SITE_RELEASE_WRITER_KEY" \
            --data-binary @"$RUNNER_TEMP/latest-release.json"
