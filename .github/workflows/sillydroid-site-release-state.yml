name: SillyDroid Site Release State

on:
  workflow_dispatch:
  release:
    types:
      - published
      - edited
      - deleted

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sillydroid-site-release-state
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: site/.node-version
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Sync latest release state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          node ./site/scripts/sync-latest-release-state.mjs \
            --repository '${{ github.repository }}' \
            --event-action '${{ github.event.action }}' \
            --output './site/src/content/releaseState/latest-release.json'

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v4
